<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03030d;--bg2:#07071a;--bg3:#0d0d24;
  --surf:rgba(255,255,255,0.042);--surf-h:rgba(255,255,255,0.08);
  --bdr:rgba(255,255,255,0.07);--bdr-h:rgba(255,255,255,0.16);
  --txt:#eceef8;--txt2:rgba(236,238,248,0.6);--txt3:rgba(236,238,248,0.32);
  --blue:#3B82F6;--cyan:#22D3EE;--purple:#A855F7;
  --g1:linear-gradient(135deg,#3B82F6 0%,#22D3EE 50%,#A855F7 100%);
  --gt:linear-gradient(135deg,#60A5FA 0%,#22D3EE 45%,#C084FC 100%);
  --gbtn:linear-gradient(135deg,#1D4ED8,#0E7490,#6D28D9);
  --glow-b:rgba(59,130,246,.22);--glow-p:rgba(168,85,247,.18);
  --nav-h:70px;--r:16px;--ease:cubic-bezier(.23,1,.32,1);
  --fh:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#e6ecfd;--bg3:#dce5fc;
  --surf:rgba(255,255,255,0.7);--surf-h:rgba(255,255,255,0.95);
  --bdr:rgba(59,130,246,0.1);--bdr-h:rgba(59,130,246,0.26);
  --txt:#0b0b1e;--txt2:rgba(11,11,30,0.62);--txt3:rgba(11,11,30,0.38);
  --gbtn:linear-gradient(135deg,#2563EB,#0891B2,#7C3AED);
  --glow-b:rgba(59,130,246,.1);--glow-p:rgba(168,85,247,.08);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);line-height:1.6;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:rgba(59,130,246,.4);border-radius:4px}

/* AMBIENT ORBS */
.amb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(90px)}
.a1{width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,.13),transparent 70%);top:-250px;left:-200px}
.a2{width:600px;height:600px;background:radial-gradient(circle,rgba(168,85,247,.12),transparent 70%);bottom:-180px;right:-150px}
.a3{width:450px;height:450px;background:radial-gradient(circle,rgba(34,211,238,.08),transparent 70%);top:45%;left:38%}

/* HERO GRID BG */
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);pointer-events:none}
[data-theme="light"] .hero-grid{background-image:linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px)}

/* LOGO */
.logo-wrap{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none;user-select:none}
.logo-name{font-family:var(--fh);font-weight:800;font-size:1.18rem;letter-spacing:-.03em;background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-img{height:40px;width:auto;display:block;border-radius:9px}
.logo-img-ft{height:48px}
[data-theme="light"] .logo-img{box-shadow:0 2px 12px rgba(0,0,0,.12)}
@media(max-width:600px){.logo-img{height:34px}}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;display:flex;align-items:center;padding:0 5%;transition:all .3s}
.nav.sc{background:rgba(3,3,13,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr)}
[data-theme="light"] .nav.sc{background:rgba(240,244,255,.92)}
.nav-in{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1280px;margin:0 auto}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:var(--txt2);font-size:.87rem;font-weight:500;cursor:pointer;transition:color .2s}
.nav-links a:hover,.nav-links a.on{color:var(--txt)}
.nav-r{display:flex;align-items:center;gap:10px}
.ib{width:38px;height:38px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .2s;flex-shrink:0}
.ib:hover{background:var(--surf-h);color:var(--txt);border-color:var(--bdr-h)}
.hb{flex-direction:column;gap:5px;display:none}
.hb span{display:block;width:20px;height:2px;background:var(--txt);border-radius:2px;transition:all .3s}
.hb.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hb.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hb.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* MOBILE DRAWER */
.mob-drawer{position:fixed;top:var(--nav-h);left:0;right:0;background:rgba(3,3,13,.96);backdrop-filter:blur(24px);z-index:99;border-bottom:1px solid var(--bdr);padding:24px 5%;transform:translateY(-110%);transition:transform .35s var(--ease);display:flex;flex-direction:column;gap:4px}
[data-theme="light"] .mob-drawer{background:rgba(240,244,255,.98)}
.mob-drawer.open{transform:translateY(0)}
.mob-link{color:var(--txt2);font-size:1.05rem;font-weight:600;font-family:var(--fh);cursor:pointer;padding:12px 0;border-bottom:1px solid var(--bdr);transition:color .2s}
.mob-link:last-of-type{border-bottom:none}
.mob-link:hover,.mob-link.on{color:var(--txt)}
.mob-cta{margin-top:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:12px;font-family:var(--fh);font-weight:700;font-size:.9rem;cursor:pointer;transition:all .25s var(--ease);text-decoration:none;border:none;letter-spacing:-.01em;white-space:nowrap}
.btn-g{background:var(--gbtn);color:#fff;box-shadow:0 4px 28px rgba(59,130,246,.38),0 0 0 1px rgba(59,130,246,.1);position:relative;overflow:hidden}
.btn-g::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 50%);opacity:0;transition:opacity .2s}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 10px 44px rgba(59,130,246,.5),0 0 60px rgba(168,85,247,.2);opacity:1}
.btn-g:hover::after{opacity:1}
.btn-o{background:transparent;border:1.5px solid var(--bdr-h);color:var(--txt)}
.btn-o:hover{background:var(--surf-h);border-color:var(--bdr-h);transform:translateY(-2px)}
.btn-sm{padding:9px 20px;font-size:.82rem;border-radius:9px}
@keyframes pulseCta{0%,100%{box-shadow:0 4px 28px rgba(59,130,246,.38),0 0 0 1px rgba(59,130,246,.1)}50%{box-shadow:0 4px 44px rgba(59,130,246,.6),0 0 40px rgba(168,85,247,.3),0 0 0 1px rgba(59,130,246,.2)}}
.btn-pulse{animation:pulseCta 2.5s ease-in-out infinite}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all .3s var(--ease)}
.card-hov:hover{background:var(--surf-h);border-color:var(--bdr-h);transform:translateY(-5px);box-shadow:0 24px 64px rgba(0,0,0,.22),0 0 0 1px var(--bdr-h)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-family:var(--fh)}
.bd-glass{background:var(--surf);border:1px solid var(--bdr);color:var(--txt2)}
.bd-blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.22);color:#60A5FA}
.bd-cyan{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.22);color:#22D3EE}
.bd-purple{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.22);color:#C084FC}
.bd-green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.22);color:#34D399}
.bd-orange{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:#FCD34D}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22D3EE;box-shadow:0 0 8px #22D3EE;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* GT */
.gt{background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* DIVIDER */
.gsep{height:1px;background:linear-gradient(90deg,transparent,var(--blue) 25%,var(--cyan) 50%,var(--purple) 75%,transparent);opacity:.18}

/* LAYOUT */
.page{position:relative;z-index:1;padding-top:var(--nav-h)}
.sec{padding:96px 5%;max-width:1280px;margin:0 auto}
.stag{font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;font-family:var(--fh)}
h1.hd{font-family:var(--fh);font-weight:800;font-size:clamp(2.8rem,5.2vw,5.2rem);line-height:1.03;letter-spacing:-.043em}
h2.hd{font-family:var(--fh);font-weight:800;font-size:clamp(2rem,3.2vw,3.1rem);line-height:1.06;letter-spacing:-.035em}
.sub{color:var(--txt2);font-size:1.05rem;line-height:1.75;margin-top:14px}

/* HERO */
.hero{position:relative;min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;overflow:hidden}
.hero-content{display:grid;grid-template-columns:1fr 440px;gap:64px;align-items:center;padding:64px 5% 80px;max-width:1280px;margin:0 auto;width:100%}

/* HEADLINE ANIMATION */
.hero-word{display:inline-block;overflow:hidden;vertical-align:bottom}
.hero-word span{display:block}
/* Base = visible end-state (safe for print/PDF/reduced-motion/no-JS) */
.hword{display:block;opacity:1;transform:none}
/* Hidden-then-animate only while JS says .go AND motion allowed */
@media (prefers-reduced-motion: no-preference){
  .hero-h1.go .hword{opacity:0;transform:translateY(105%);animation:wordUp .75s var(--ease) var(--wd,0ms) both}
}
/* Guaranteed reveal: setTimeout adds .revealed even in backgrounded tabs */
.hero-h1.revealed .hword{opacity:1!important;transform:none!important;animation:none!important}
@keyframes wordUp{from{transform:translateY(105%);opacity:0}to{transform:translateY(0);opacity:1}}
@media print{.hword{opacity:1!important;transform:none!important;animation:none!important}}

/* GOOGLE AI MODE SECTION */
.ai-grid{display:grid;grid-template-columns:1fr 460px;gap:64px;align-items:center}
.ai-points{display:flex;flex-direction:column;gap:13px;margin-top:30px}
.ai-point{display:flex;align-items:center;gap:13px;font-size:.93rem;font-weight:500;color:var(--txt2)}
.ai-point-ico{width:38px;height:38px;border-radius:11px;background:var(--surf-h);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.ai-mock{position:relative;background:var(--surf);border:1px solid var(--bdr-h);border-radius:22px;padding:24px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 30px 90px rgba(0,0,0,.35),0 0 60px var(--glow-b)}
.ai-mock-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 18px;border-radius:100px;background:var(--bg);border:1px solid var(--bdr);margin-bottom:20px}
.ai-mock-q{font-size:.85rem;color:var(--txt2)}
.ai-mock-mic{font-size:.9rem;opacity:.7}
.ai-mock-tab{display:inline-flex;align-items:center;gap:8px;font-family:var(--fh);font-weight:700;font-size:.82rem;color:var(--cyan);margin-bottom:16px;letter-spacing:.01em}
.ai-spark{display:inline-flex;width:22px;height:22px;border-radius:7px;background:var(--g1);align-items:center;justify-content:center;color:#fff;font-size:.68rem}
.ai-mock-answer{position:relative}
.ai-line{height:9px;border-radius:6px;background:linear-gradient(90deg,var(--surf-h),var(--bdr));margin-bottom:12px}
.ai-cite{font-size:.88rem;line-height:1.65;color:var(--txt2);margin-top:18px}
.ai-cite strong{color:var(--cyan)}
.ai-sources{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.ai-src{font-size:.74rem;font-weight:700;font-family:var(--fh);padding:6px 13px;border-radius:100px;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.28);color:#22D3EE}
.ai-src-dim{background:var(--surf-h);border-color:var(--bdr);color:var(--txt3)}
.ai-badge-float{position:absolute;top:-14px;right:20px;background:var(--g1);color:#fff;font-family:var(--fh);font-weight:700;font-size:.74rem;padding:7px 15px;border-radius:100px;box-shadow:0 8px 28px rgba(59,130,246,.45);z-index:2}
@media (prefers-reduced-motion: no-preference){.ai-badge-float{animation:flt 4s ease-in-out infinite}}

/* FAQ */
.faq-wrap{border-top:1px solid var(--bdr);padding:72px 5%;max-width:880px;margin:0 auto}
.faq-list{display:flex;flex-direction:column;gap:12px;margin-top:36px}
.faq-item{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;transition:border-color .2s}
.faq-item.open{border-color:var(--bdr-h)}
.faq-q{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 24px;cursor:pointer;font-family:var(--fh);font-weight:600;font-size:1rem;letter-spacing:-.01em}
.faq-q:hover{color:var(--txt)}
.faq-ico{width:26px;height:26px;border-radius:8px;background:var(--surf-h);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;transition:all .25s var(--ease);color:var(--cyan)}
.faq-item.open .faq-ico{background:var(--g1);border-color:transparent;color:#fff;transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s var(--ease)}
.faq-a-inner{padding:0 24px 22px;color:var(--txt2);font-size:.92rem;line-height:1.75}
@media(max-width:1024px){.ai-grid{grid-template-columns:1fr;gap:40px}}

/* WHY MARKETING CHANGED — before/after */
.shift-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:28px;align-items:center;margin-top:52px}
.shift-card{background:var(--surf);border:1px solid var(--bdr);border-radius:18px;padding:26px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.shift-new{border-color:var(--bdr-h);box-shadow:0 24px 70px rgba(0,0,0,.28),0 0 50px var(--glow-b)}
.shift-tag{display:inline-flex;font-family:var(--fh);font-weight:700;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:100px;margin-bottom:16px}
.shift-tag-old{background:var(--surf-h);border:1px solid var(--bdr);color:var(--txt3)}
.shift-tag-new{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.28);color:#22D3EE}
.shift-q{font-family:var(--fh);font-weight:600;font-size:.92rem;color:var(--txt2);padding:11px 16px;border-radius:100px;background:var(--bg);border:1px solid var(--bdr);margin-bottom:18px}
.serp-row{margin-bottom:16px}
.serp-title-line{height:10px;width:75%;border-radius:5px;background:linear-gradient(90deg,#60A5FA,var(--bdr));margin-bottom:7px;opacity:.7}
.serp-url-line{height:7px;width:45%;border-radius:5px;background:var(--surf-h)}
.shift-note{margin-top:18px;font-size:.8rem;color:var(--txt3);line-height:1.6;border-top:1px solid var(--bdr);padding-top:14px}
.shift-arrow{font-family:var(--fh);font-weight:800;font-size:1.6rem;color:var(--cyan);text-align:center}

/* AI SEO PLAYBOOK */
.play-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:52px}
.play-card{padding:32px;position:relative;overflow:hidden}
.play-num{position:absolute;top:20px;right:24px;font-family:var(--fh);font-weight:800;font-size:2.4rem;letter-spacing:-.04em;color:var(--bdr);line-height:1}
.play-ico{width:52px;height:52px;border-radius:14px;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:20px;box-shadow:0 6px 22px rgba(59,130,246,.28)}
.play-t{font-family:var(--fh);font-weight:700;font-size:1.12rem;letter-spacing:-.02em;margin-bottom:10px}
.play-d{color:var(--txt2);font-size:.88rem;line-height:1.7}
@media(max-width:900px){
  .shift-grid{grid-template-columns:1fr}
  .shift-arrow{transform:rotate(90deg);margin:4px 0}
  .play-grid{grid-template-columns:1fr}
}

/* KPI ROW */
.kpi-row{display:flex;gap:0;border:1px solid var(--bdr);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.025);width:fit-content}
.kpi{padding:18px 26px;text-align:center;border-right:1px solid var(--bdr)}
.kpi:last-child{border-right:none}
.kpi-v{font-family:var(--fh);font-weight:800;font-size:1.75rem;letter-spacing:-.04em;background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1}
.kpi-l{color:var(--txt3);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:4px}

/* HERO PHOTO CARD */
.hphoto{width:100%;aspect-ratio:.82;border-radius:24px;background:linear-gradient(145deg,rgba(59,130,246,.1),rgba(168,85,247,.1));border:1px solid var(--bdr-h);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.hphoto-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 25%,rgba(59,130,246,.2),transparent 55%),radial-gradient(ellipse at 70% 75%,rgba(168,85,247,.2),transparent 55%)}
.hphoto-content{position:relative;z-index:1;text-align:center;padding:32px 24px}
.hav{width:152px;height:152px;border-radius:50%;background:var(--g1);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:3.5rem;color:#fff;box-shadow:0 0 60px rgba(59,130,246,.45),0 0 120px rgba(168,85,247,.2)}
.hname-card{background:rgba(3,3,13,.7);backdrop-filter:blur(12px);border:1px solid var(--bdr-h);border-radius:14px;padding:14px 20px;margin-top:4px;display:inline-block}
.hcerts{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:14px}

/* FLOATING BADGES */
.fb{position:absolute;background:rgba(7,7,26,.88);backdrop-filter:blur(14px);border:1px solid var(--bdr-h);border-radius:12px;padding:9px 13px;font-family:var(--fh);font-size:.75rem;font-weight:600;white-space:nowrap;animation:flt 4s ease-in-out infinite;z-index:2}
[data-theme="light"] .fb{background:rgba(255,255,255,.9)}

// ── FADE-IN ──
function FI({ children, d = 0, style = {} }) {
  const r = useRef();
  useEffect(() => {
    const el = r.current;if (!el) return;
    if (d === 0) {el.classList.add('show');return;}
    const t = setTimeout(() => el.classList.add('show'), d);
    const obs = new IntersectionObserver(([e]) => {if (e.isIntersecting) {el.classList.add('show');clearTimeout(t);}}, { threshold: 0, rootMargin: '0px 0px -20px 0px' });
    obs.observe(el);
    return () => {obs.disconnect();clearTimeout(t);};
  }, []);
  return <div ref={r} className="fi-el" style={{ transitionDelay: d > 0 ? `${d}ms` : '0ms', ...style }}>{children}</div>;
}

  const [theme, setTheme] = useState(() => localStorage.getItem('my_th') || 'dark');
  const [twOpen, setTwOpen] = useState(false);

  useEffect(() => {document.documentElement.setAttribute('data-theme', theme);localStorage.setItem('my_th', theme);}, [theme]);
  useEffect(() => {localStorage.setItem('my_pg', page);window.scrollTo({ top: 0 });applyMeta(page);applyFaqSchema(page);}, [page]);

  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTwOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTwOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const PAGES = { Home: <HomePage setPage={setPage} />, About: <AboutPage />, Services: <ServicesPage setPage={setPage} />, Portfolio: <PortfolioPage />, Blog: <BlogPage />, Contact: <ContactPage /> };

  return (
    <>
      <Navbar page={page} setPage={setPage} theme={theme} toggleTheme={() => setTheme((t) => t === 'dark' ? 'light' : 'dark')} />
      <div key={page} style={{ animation: 'pgIn .4s cubic-bezier(.23,1,.32,1)' }}>{PAGES[page] || PAGES.Home}<Footer setPage={setPage} /></div>
      <Tweaks open={twOpen} />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
