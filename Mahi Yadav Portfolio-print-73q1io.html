<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03030d;--bg2:#07071a;--bg3:#0d0d24;
  --surf:rgba(255,255,255,0.042);--surf-h:rgba(255,255,255,0.08);
  --bdr:rgba(255,255,255,0.07);--bdr-h:rgba(255,255,255,0.16);
  --txt:#eceef8;--txt2:rgba(236,238,248,0.6);--txt3:rgba(236,238,248,0.32);
  --blue:#3B82F6;--cyan:#22D3EE;--purple:#A855F7;
  --g1:linear-gradient(135deg,#3B82F6 0%,#22D3EE 50%,#A855F7 100%);
  --gt:linear-gradient(135deg,#60A5FA 0%,#22D3EE 45%,#C084FC 100%);
  --gbtn:linear-gradient(135deg,#1D4ED8,#0E7490,#6D28D9);
  --nav-h:70px;--r:16px;--ease:cubic-bezier(.23,1,.32,1);
  --fh:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif;
}
[data-theme="light"]{
  --bg:#f0f4ff;--bg2:#e6ecfd;--bg3:#dce5fc;
  --surf:rgba(255,255,255,0.7);--surf-h:rgba(255,255,255,0.95);
  --bdr:rgba(59,130,246,0.1);--bdr-h:rgba(59,130,246,0.26);
  --txt:#0b0b1e;--txt2:rgba(11,11,30,0.62);--txt3:rgba(11,11,30,0.38);
  --gbtn:linear-gradient(135deg,#2563EB,#0891B2,#7C3AED);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);line-height:1.6;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:rgba(59,130,246,.4);border-radius:4px}

/* AMBIENT ORBS */
.amb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(90px)}
.a1{width:700px;height:700px;background:radial-gradient(circle,rgba(59,130,246,.13),transparent 70%);top:-250px;left:-200px}
.a2{width:600px;height:600px;background:radial-gradient(circle,rgba(168,85,247,.12),transparent 70%);bottom:-180px;right:-150px}
.a3{width:450px;height:450px;background:radial-gradient(circle,rgba(34,211,238,.08),transparent 70%);top:45%;left:38%}

/* HERO GRID BG */
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);pointer-events:none}
[data-theme="light"] .hero-grid{background-image:linear-gradient(rgba(59,130,246,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.06) 1px,transparent 1px)}

/* LOGO */
.logo-wrap{display:flex;align-items:center;gap:9px;cursor:pointer;text-decoration:none;user-select:none}
.logo-name{font-family:var(--fh);font-weight:800;font-size:1.18rem;letter-spacing:-.03em;background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:100;display:flex;align-items:center;padding:0 5%;transition:all .3s}
.nav.sc{background:rgba(3,3,13,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr)}
[data-theme="light"] .nav.sc{background:rgba(240,244,255,.92)}
.nav-in{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1280px;margin:0 auto}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:var(--txt2);font-size:.87rem;font-weight:500;cursor:pointer;transition:color .2s}
.nav-links a:hover,.nav-links a.on{color:var(--txt)}
.nav-r{display:flex;align-items:center;gap:10px}
.ib{width:38px;height:38px;border-radius:10px;border:1px solid var(--bdr);background:var(--surf);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .2s;flex-shrink:0}
.ib:hover{background:var(--surf-h);color:var(--txt);border-color:var(--bdr-h)}
.hb{flex-direction:column;gap:5px;display:none}
.hb span{display:block;width:20px;height:2px;background:var(--txt);border-radius:2px;transition:all .3s}
.hb.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hb.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hb.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* MOBILE DRAWER */
.mob-drawer{position:fixed;top:var(--nav-h);left:0;right:0;background:rgba(3,3,13,.96);backdrop-filter:blur(24px);z-index:99;border-bottom:1px solid var(--bdr);padding:24px 5%;transform:translateY(-110%);transition:transform .35s var(--ease);display:flex;flex-direction:column;gap:4px}
[data-theme="light"] .mob-drawer{background:rgba(240,244,255,.98)}
.mob-drawer.open{transform:translateY(0)}
.mob-link{color:var(--txt2);font-size:1.05rem;font-weight:600;font-family:var(--fh);cursor:pointer;padding:12px 0;border-bottom:1px solid var(--bdr);transition:color .2s}
.mob-link:last-of-type{border-bottom:none}
.mob-link:hover,.mob-link.on{color:var(--txt)}
.mob-cta{margin-top:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:12px;font-family:var(--fh);font-weight:700;font-size:.9rem;cursor:pointer;transition:all .25s var(--ease);text-decoration:none;border:none;letter-spacing:-.01em;white-space:nowrap}
.btn-g{background:var(--gbtn);color:#fff;box-shadow:0 4px 28px rgba(59,130,246,.38),0 0 0 1px rgba(59,130,246,.1);position:relative;overflow:hidden}
.btn-g::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 50%);opacity:0;transition:opacity .2s}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 10px 44px rgba(59,130,246,.5),0 0 60px rgba(168,85,247,.2);opacity:1}
.btn-g:hover::after{opacity:1}
.btn-o{background:transparent;border:1.5px solid var(--bdr-h);color:var(--txt)}
.btn-o:hover{background:var(--surf-h);border-color:var(--bdr-h);transform:translateY(-2px)}
.btn-sm{padding:9px 20px;font-size:.82rem;border-radius:9px}
@keyframes pulseCta{0%,100%{box-shadow:0 4px 28px rgba(59,130,246,.38),0 0 0 1px rgba(59,130,246,.1)}50%{box-shadow:0 4px 44px rgba(59,130,246,.6),0 0 40px rgba(168,85,247,.3),0 0 0 1px rgba(59,130,246,.2)}}
.btn-pulse{animation:pulseCta 2.5s ease-in-out infinite}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:all .3s var(--ease)}
.card-hov:hover{background:var(--surf-h);border-color:var(--bdr-h);transform:translateY(-5px);box-shadow:0 24px 64px rgba(0,0,0,.22),0 0 0 1px var(--bdr-h)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-family:var(--fh)}
.bd-glass{background:var(--surf);border:1px solid var(--bdr);color:var(--txt2)}
.bd-blue{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.22);color:#60A5FA}
.bd-cyan{background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.22);color:#22D3EE}
.bd-purple{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.22);color:#C084FC}
.bd-green{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.22);color:#34D399}
.bd-orange{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:#FCD34D}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22D3EE;box-shadow:0 0 8px #22D3EE;flex-shrink:0;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* GT */
.gt{background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* DIVIDER */
.gsep{height:1px;background:linear-gradient(90deg,transparent,var(--blue) 25%,var(--cyan) 50%,var(--purple) 75%,transparent);opacity:.18}

/* LAYOUT */
.page{position:relative;z-index:1;padding-top:var(--nav-h)}
.sec{padding:96px 5%;max-width:1280px;margin:0 auto}
.stag{font-size:.66rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;font-family:var(--fh)}
h1.hd{font-family:var(--fh);font-weight:800;font-size:clamp(2.8rem,5.2vw,5.2rem);line-height:1.03;letter-spacing:-.043em}
h2.hd{font-family:var(--fh);font-weight:800;font-size:clamp(2rem,3.2vw,3.1rem);line-height:1.06;letter-spacing:-.035em}
.sub{color:var(--txt2);font-size:1.05rem;line-height:1.75;margin-top:14px}

/* HERO */
.hero{position:relative;min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;overflow:hidden}
.hero-content{display:grid;grid-template-columns:1fr 440px;gap:64px;align-items:center;padding:64px 5% 80px;max-width:1280px;margin:0 auto;width:100%}

/* HEADLINE ANIMATION */
.hero-word{display:inline-block;overflow:hidden;vertical-align:bottom}
.hero-word span{display:block}
/* Base = visible end-state (safe for print/PDF/reduced-motion/no-JS) */
.hword{display:block;opacity:1;transform:none}
/* Hidden-then-animate only while JS says .go AND motion allowed */
@media (prefers-reduced-motion: no-preference){
  .hero-h1.go .hword{opacity:0;transform:translateY(105%);animation:wordUp .75s var(--ease) var(--wd,0ms) both}
}
/* Guaranteed reveal: setTimeout adds .revealed even in backgrounded tabs */
.hero-h1.revealed .hword{opacity:1!important;transform:none!important;animation:none!important}
@keyframes wordUp{from{transform:translateY(105%);opacity:0}to{transform:translateY(0);opacity:1}}
@media print{.hword{opacity:1!important;transform:none!important;animation:none!important}}

/* KPI ROW */
.kpi-row{display:flex;gap:0;border:1px solid var(--bdr);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.025);width:fit-content}
.kpi{padding:18px 26px;text-align:center;border-right:1px solid var(--bdr)}
.kpi:last-child{border-right:none}
.kpi-v{font-family:var(--fh);font-weight:800;font-size:1.75rem;letter-spacing:-.04em;background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1}
.kpi-l{color:var(--txt3);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:4px}

/* HERO PHOTO CARD */
.hphoto{width:100%;aspect-ratio:.82;border-radius:24px;background:linear-gradient(145deg,rgba(59,130,246,.1),rgba(168,85,247,.1));border:1px solid var(--bdr-h);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.hphoto-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 25%,rgba(59,130,246,.2),transparent 55%),radial-gradient(ellipse at 70% 75%,rgba(168,85,247,.2),transparent 55%)}
.hphoto-content{position:relative;z-index:1;text-align:center;padding:32px 24px}
.hav{width:152px;height:152px;border-radius:50%;background:var(--g1);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:3.5rem;color:#fff;box-shadow:0 0 60px rgba(59,130,246,.45),0 0 120px rgba(168,85,247,.2)}
.hname-card{background:rgba(3,3,13,.7);backdrop-filter:blur(12px);border:1px solid var(--bdr-h);border-radius:14px;padding:14px 20px;margin-top:4px;display:inline-block}
.hcerts{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:14px}

/* FLOATING BADGES */
.fb{position:absolute;background:rgba(7,7,26,.88);backdrop-filter:blur(14px);border:1px solid var(--bdr-h);border-radius:12px;padding:9px 13px;font-family:var(--fh);font-size:.75rem;font-weight:600;white-space:nowrap;animation:flt 4s ease-in-out infinite;z-index:2}
[data-theme="light"] .fb{background:rgba(255,255,255,.9)}
.fb:nth-child(1){top:10%;left:-48px;animation-delay:0s}
.fb:nth-child(2){top:40%;right:-48px;animation-delay:1.4s}
.fb:nth-child(3){bottom:16%;left:-56px;animation-delay:.8s}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.fbv{display:block;font-size:1rem;margin-bottom:2px}

/* TRUST MARQUEE */
.marquee-wrap{overflow:hidden;padding:22px 0;background:var(--surf);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
.marquee-track{display:flex;gap:0;width:max-content;animation:marquee 28s linear infinite}
.marquee-track:hover{animation-play-state:paused}
.marquee-item{padding:0 40px;color:var(--txt3);font-family:var(--fh);font-weight:700;font-size:.88rem;letter-spacing:-.01em;white-space:nowrap;display:flex;align-items:center;gap:14px;border-right:1px solid var(--bdr)}
.marquee-sep{color:var(--cyan);font-size:.7rem}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--bdr);border-radius:20px;overflow:hidden;margin:0 5%}
.sg-item{padding:40px 24px;text-align:center;background:var(--surf);border-right:1px solid var(--bdr);transition:background .2s;cursor:default}
.sg-item:last-child{border-right:none}
.sg-item:hover{background:var(--surf-h)}
.sg-val{font-family:var(--fh);font-weight:800;font-size:2.8rem;letter-spacing:-.05em;background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1}
.sg-lbl{color:var(--txt2);font-size:.82rem;margin-top:8px}
.sg-sub{color:var(--txt3);font-size:.72rem;margin-top:3px}

/* SERVICES (homepage overview) */
.svc-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bdr);border:1px solid var(--bdr);border-radius:20px;overflow:hidden;margin-top:52px}
.svo-card{background:var(--bg2);padding:30px 28px;transition:all .25s var(--ease);cursor:pointer;position:relative;overflow:hidden}
.svo-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--g1);transform:scaleX(0);transform-origin:left;transition:transform .3s var(--ease)}
.svo-card:hover{background:var(--bg3)}
.svo-card:hover::after{transform:scaleX(1)}
[data-theme="light"] .svo-card{background:rgba(255,255,255,.6)}
[data-theme="light"] .svo-card:hover{background:rgba(255,255,255,.9)}
.svo-ico{font-size:1.5rem;margin-bottom:14px;display:block;filter:drop-shadow(0 0 8px rgba(59,130,246,.4))}
.svo-title{font-family:var(--fh);font-weight:700;font-size:1.05rem;letter-spacing:-.02em;margin-bottom:6px}
.svo-tag{color:var(--txt3);font-size:.8rem}
.svo-arr{position:absolute;top:24px;right:24px;color:var(--txt3);font-size:.9rem;transition:all .2s}
.svo-card:hover .svo-arr{color:var(--cyan);transform:translate(2px,-2px)}

/* CASE STUDIES */
.cs-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:52px}
.cs-card{padding:34px;cursor:pointer;position:relative;overflow:hidden}
.cs-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 0% 0%,rgba(59,130,246,.05),transparent 60%);pointer-events:none;opacity:0;transition:opacity .3s}
.cs-card:hover::before{opacity:1}
.cs-title{font-family:var(--fh);font-weight:800;font-size:1.25rem;line-height:1.25;letter-spacing:-.03em;margin:14px 0 10px}
.cs-desc{color:var(--txt2);font-size:.88rem;line-height:1.7;margin-bottom:26px}
.cs-res{display:flex;gap:24px;flex-wrap:wrap}
.cs-rv{font-family:var(--fh);font-weight:800;font-size:2.4rem;letter-spacing:-.05em;background:var(--gt);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.cs-rl{color:var(--txt3);font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:5px}
.cs-arrow{position:absolute;top:28px;right:28px;width:36px;height:36px;border-radius:10px;background:var(--surf-h);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;transition:all .25s}
.cs-card:hover .cs-arrow{background:var(--g1);border-color:transparent;transform:translate(2px,-2px)}

/* TESTIMONIALS MARQUEE */
.testi-track{display:flex;gap:16px;width:max-content;animation:marquee 40s linear infinite}
.testi-track:hover{animation-play-state:paused}
.testi-card{width:380px;flex-shrink:0;padding:26px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);backdrop-filter:blur(12px)}
.testi-stars{color:#F59E0B;letter-spacing:2px;font-size:.82rem;margin-bottom:12px}
.testi-q{font-size:1.8rem;line-height:1;color:var(--cyan);font-family:Georgia,serif;margin-bottom:6px}
.testi-txt{color:var(--txt2);font-size:.88rem;line-height:1.7;margin-bottom:18px}
.testi-av{display:flex;align-items:center;gap:10px}
.tav-dot{width:38px;height:38px;border-radius:50%;background:var(--g1);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
.tav-nm{font-family:var(--fh);font-weight:700;font-size:.88rem}
.tav-rl{color:var(--txt3);font-size:.74rem}

/* TOOLS */
.tools-pills{display:flex;flex-wrap:wrap;gap:10px;margin-top:36px}
.tp{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:100px;background:var(--surf);border:1px solid var(--bdr);font-size:.83rem;font-weight:600;font-family:var(--fh);color:var(--txt2);transition:all .2s;cursor:default}
.tp:hover{background:var(--surf-h);border-color:var(--bdr-h);color:var(--txt);transform:translateY(-2px)}
.tpdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* CTA SECTION */
.cta-sect{margin:0 5%;border-radius:24px;padding:80px 60px;text-align:center;position:relative;overflow:hidden;border:1px solid var(--bdr-h);background:linear-gradient(145deg,rgba(37,99,235,.1),rgba(8,145,178,.06),rgba(124,58,237,.1))}

// ── FADE-IN ──
function FI({ children, d = 0, style = {} }) {
  const r = useRef();
  useEffect(() => {
    const el = r.current;if (!el) return;
    if (d === 0) {el.classList.add('show');return;}
    const t = setTimeout(() => el.classList.add('show'), d);
    const obs = new IntersectionObserver(([e]) => {if (e.isIntersecting) {el.classList.add('show');clearTimeout(t);}}, { threshold: 0, rootMargin: '0px 0px -20px 0px' });
    obs.observe(el);
    return () => {obs.disconnect();clearTimeout(t);};
  }, []);
  return <div ref={r} className="fi-el" style={{ transitionDelay: d > 0 ? `${d}ms` : '0ms', ...style }}>{children}</div>;
}

function Tweaks({ open }) {
  const GRADS = [
  ['Blue→Purple', '135deg,#3B82F6,#22D3EE,#A855F7', '135deg,#60A5FA,#22D3EE,#C084FC'],
  ['Cyan→Blue', '135deg,#06B6D4,#3B82F6', '135deg,#22D3EE,#60A5FA'],
  ['Amber→Pink', '135deg,#F59E0B,#EC4899', '135deg,#FCD34D,#F472B6']];

  const [cur, setCur] = useState(0);
  const apply = (i) => {
    const [l, g, gt] = GRADS[i];
    document.documentElement.style.setProperty('--g1', `linear-gradient(${g})`);
    document.documentElement.style.setProperty('--gt', `linear-gradient(${gt})`);
    document.documentElement.style.setProperty('--gbtn', `linear-gradient(${g})`);
    setCur(i);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentGradient: l } }, '*');
  };
  return (
    <div className={`tw-panel${open ? ' open' : ''}`}>
      <div className="tw-ttl">✦ Tweaks</div>
      <div className="tw-row">
        <span className="tw-lbl">Theme</span>
        <div className="tw-opts">
          {['Dark', 'Light'].map((t) =>
          <button key={t} className={`tw-o${document.documentElement.dataset.theme === t.toLowerCase() ? ' on' : ''}`}
          onClick={() => document.documentElement.setAttribute('data-theme', t.toLowerCase())}>{t}</button>
          )}
        </div>
      </div>
      <div className="tw-row">
        <span className="tw-lbl">Gradient</span>
        <div className="tw-opts">
          {GRADS.map(([l], i) => <button key={l} className={`tw-o${cur === i ? ' on' : ''}`} onClick={() => apply(i)}>{l}</button>)}
        </div>
      </div>
      <div className="tw-row">
        <span className="tw-lbl">Card Radius</span>
        <div className="tw-opts">
          {[['Rounded', '16px'], ['Sharp', '6px'], ['Soft', '24px']].map(([l, v]) =>
          <button key={l} className="tw-o" onClick={() => {document.documentElement.style.setProperty('--r', v);window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { cardRadius: v } }, '*');}}>{l}</button>
          )}
        </div>
      </div>
    </div>);

}

<script>
(async () => {
  if (!document.title || !document.title.trim()) document.title = "Mahi Yadav Portfolio";
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    print-color-adjust: exact; -webkit-print-color-adjust: exact;\n    backdrop-filter: none !important; -webkit-backdrop-filter: none !important;\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  // Reveal content gated on scroll or visibility before printing. Lazy <img>,
  // IntersectionObserver fade-ins, and collapsed <details> don't render while
  // off-screen, so a long page would print with them blank or closed. Open
  // every <details>, force native-lazy images eager, and scroll the document
  // through its full height to trip lazy-load + IO; then wait (bounded) for the
  // newly-triggered images. Inert for deck-stage (slides aren't scroll-gated).
  try {
    for (const d of document.querySelectorAll('details')) d.open = true;
    for (const img of document.querySelectorAll('img[loading="lazy"]'))
      img.loading = 'eager';
    const scroller = document.scrollingElement || document.documentElement;
    const full = Math.max(scroller.scrollHeight, document.body.scrollHeight);
    const step = window.innerHeight || 800;
    for (let y = 0; y <= full; y += step) {
      window.scrollTo(0, y);
      await new Promise((r) => requestAnimationFrame(r));
    }
    window.scrollTo(0, 0);
    await Promise.race([
      Promise.all(
        [...document.images].map((img) =>
          img.complete
            ? null
            : new Promise((res) => {
                img.addEventListener('load', res, { once: true });
                img.addEventListener('error', res, { once: true });
              })
        )
      ),
      new Promise((r) => setTimeout(r, 4000)),
    ]);
  } catch (e) {}
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  // Re-append deck-stage's @page last so no author @page can add a margin and
  // spill each full-bleed slide onto two sheets. Backstop for old copies.
  if (ds) {
    let pg = document.getElementById('deck-stage-print-page');
    if (!pg) {
      pg = document.createElement('style');
      pg.textContent = '@page{size:' + (+ds.getAttribute('width') || 1920) +
        'px ' + (+ds.getAttribute('height') || 1080) + 'px;margin:0}';
    }
    document.body.appendChild(pg);
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  // Size the PDF page to the rendered design unless the file opted into
  // standard paper via @page{size:letter|A4|…}. Decks own their own @page.
  let frame = null, ownsPaper = false, ownsPxPage = false;
  try {
    if (!ds) {
      const eachRule = (fn) => {
        for (const sh of document.styleSheets) {
          let rules; try { rules = sh.cssRules; } catch (e) { continue; }
          for (const r of rules) {
            if (fn(r)) return true;
            if (r.cssRules) for (const n of r.cssRules) if (fn(n)) return true;
          }
        }
        return false;
      };
      eachRule(r => {
        if (r.type !== 6) return false;
        const m = /\bsize\s*:\s*([^;}]+)/i.exec(r.cssText || '');
        if (!m) return false;
        if (/\b(letter|a[3-5]|legal|ledger)\b/i.test(m[1])) ownsPaper = true;
        if (/\d+(?:\.\d+)?px\b/i.test(m[1])) ownsPxPage = true;
        return false;
      });
      // Walk past single-child wrappers to the content root; a declared px
      // width stops early so a fixed canvas isn't unwrapped further.
      if (!ownsPaper) {
        const px = v => { const m = /^(\d+(?:\.\d+)?)px$/.exec(v || ''); return m ? +m[1] : 0; };
        let el = document.body;
        for (;;) {
          const kids = [...el.children].filter(
            c => c.tagName !== 'SCRIPT' && c.tagName !== 'STYLE' && c.tagName !== 'TEMPLATE'
          );
          if (kids.length !== 1 || !(kids[0] instanceof HTMLElement)) break;
          el.setAttribute('data-om-frame-wrap', '');
          el = kids[0];
          if (px(el.style.width) ||
              eachRule(r => r.type === 1 && el.matches(r.selectorText) && px(r.style.width))) break;
        }
        frame = { el, w: el.offsetWidth, h: Math.max(el.offsetHeight, el.scrollHeight) };
      }
      if (frame && frame.w >= 200 && frame.h >= 200) {
        // Strip the on-screen mat only — height/display stay so vh, % and
        // flex centering all resolve against the frame-sized page.
        const fst = document.createElement('style');
        fst.textContent = '@media print{@page{size:' + frame.w + 'px ' + frame.h +
          'px;margin:0}html,body,[data-om-frame-wrap]{padding:0!important;' +
          'margin:0!important;background:none!important}}';
        document.body.appendChild(fst);
      } else {
        for (const w of document.querySelectorAll('[data-om-frame-wrap]'))
          w.removeAttribute('data-om-frame-wrap');
        frame = null;
      }
    }
  } catch (e) {}
  // Relax break-inside on oversized elements. An element taller than a
  // printable page can't honor break-inside: avoid — browsers either overflow
  // it or push it whole to the next page, leaving a blank gap, then break it
  // anyway at an arbitrary point. After the final layout (content revealed,
  // animations jumped), find elements taller than a page that still compute
  // break-inside: avoid and reset them to auto, so the browser breaks them at
  // their children's boundaries instead (children keep their own avoid). PAGE_PX
  // is a conservative portrait estimate at 96 CSS px/in — Letter/A4 usable
  // height minus our 0.5in margins — so only clearly-oversized elements are
  // touched and under-page elements still stay whole. Skipped for decks (slides
  // are sized to the page) and for fixed-size canvases (frame set, or an author
  // px-based @page) — runs as before for flowing docs on letter/A4.
  try {
    if (!document.querySelector('deck-stage') && !frame && !ownsPxPage) {
      const PAGE_PX = 1024;
      // Our print defaults add a real @page margin only when the source has
      // no @page of its own; computed style can't tell us (it reports screen
      // media), so read the injected rule directly.
      const defaults = document.querySelector('style[data-omelette-print-defaults]');
      const pageInset = /@page\s*\{[^}]*margin/.test(defaults ? defaults.textContent || '' : '');
      const SEL = 'section,article,figure,table,pre,blockquote,[class~="card" i],[class~="page" i],[class~="sheet" i]';
      for (const el of document.body.querySelectorAll(SEL)) {
        if (el instanceof HTMLElement && el.offsetHeight > PAGE_PX) {
          el.setAttribute('data-om-oversized', '');
          // Fake-paged docs simulate sheets with over-tall break-after:page
          // boxes; honoring the break spills half-blank pages and ends a
          // colored box mid-sheet. Flow them, and (only when we own the page
          // inset) drop the redundant padding/background via the rule below.
          const cs = getComputedStyle(el);
          if (cs.breakAfter === 'page' || cs.pageBreakAfter === 'always') {
            el.setAttribute('data-om-fakepage', '');
          }
        }
      }
      const ost = document.createElement('style');
      ost.textContent = '@media print{' +
        '[data-om-oversized]{break-inside:auto !important;page-break-inside:auto !important}' +
        '[data-om-fakepage]{break-after:auto !important;page-break-after:auto !important}' +
        (pageInset ? '[data-om-fakepage]{padding:0 !important;background:none !important}' : '') +
        '}';
      document.head.appendChild(ost);
    }
  } catch (e) {}
  // macOS Preview renders Skia-PDF Luminosity soft-masks as opaque grey boxes;
  // swap the CSS that triggers them for Preview-safe forms.
  try {
    for (const el of document.body.querySelectorAll('*')) {
      const cs = getComputedStyle(el);

      if (cs.boxShadow !== 'none' && cs.filter === 'none') {
        const outs = [], kept = [];
        for (const s of cs.boxShadow.split(/,(?![^(]*[)])/)) {
          const t = s.trim();
          const m = t.match(/^(rgba?[(][^)]+[)]) (-?[0-9.]+px) (-?[0-9.]+px) ([0-9.]+px) -?[0-9.]+px$/);
          if (m && parseFloat(m[4]) > 0) outs.push('drop-shadow(' + m[2] + ' ' + m[3] + ' ' + m[4] + ' ' + m[1] + ')');
          else kept.push(t);
        }
        if (outs.length) {
          el.style.setProperty('filter', outs.join(' '), 'important');
          el.style.setProperty('box-shadow', kept.join(', ') || 'none', 'important');
        }
      }

      const mask = cs.maskImage && cs.maskImage !== 'none' ? cs.maskImage : cs.webkitMaskImage;
      if (mask && mask !== 'none' && cs.filter === 'none') el.style.setProperty('filter', 'opacity(1)', 'important');
    }
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
